name: Scheduled Competitor Price Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Web Scraper Engine
      env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python main.py

    - name: Commit and Push Updated Database File
      run: |
        git config --global user.name "GitHub Automation Bot"
        git config --global user.email "actions@github.com"
        git add data/tracker.db
        git commit -m "Automated Sync: Captured fresh price entries [Skip CI]" || echo "No changes found to commit"
        git push
